        const polarWindowTop = 10;
        const polarWindowWidth = (this.polarWindowMaximized ? (this.canvasWidth - 20): 440);
        const polarWindowHeight = (this.polarWindowMaximized ? (this.canvasHeight - 20): 440);
        canvasCtx.save();
        canvasCtx.beginPath();
        canvasCtx.rect(polarWindowLeft, polarWindowTop, polarWindowWidth, polarWindowHeight);
        canvasCtx.clip();
        {
          canvasCtx.fillStyle = 'rgb(0, 0, 0)';
          canvasCtx.fillRect(polarWindowLeft, polarWindowTop, polarWindowWidth, polarWindowHeight);
          const polarCenterX = polarWindowLeft + ((polarWindowWidth / 2) | 0);
          const polarCenterY = polarWindowTop + ((polarWindowHeight / 2) | 0);
          if (this.drawGrid) {
            canvasCtx.strokeStyle = '#99B7E6';
            canvasCtx.lineWidth = 1;
            for (let i = 1; i <= 30; i++) {
              canvasCtx.beginPath();
              canvasCtx.ellipse(polarCenterX, polarCenterY, (this.pixelsPerUnit * i), (this.pixelsPerUnit * i), 0, 0, (2 * Math.PI));
              canvasCtx.stroke();
            }
          }
          let totalX = 0;
          let totalY = 0;
          const hiOfSpiral1 = (this.getTermCountForSpiral1AtT(this.zeta.t) - 1);
          canvasCtx.lineWidth = 1;
          for (let hi = 0; hi < this.zeta.terms.length; hi++) {
            const term = this.zeta.terms[hi];
            totalX += (term.re * this.pixelsPerUnit);
            totalY -= (term.im * this.pixelsPerUnit);
            const endPointX = (polarCenterX + (term.re * this.pixelsPerUnit));
            const endPointY = (polarCenterY - (term.im * this.pixelsPerUnit));
            canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
            if ((hi % 2) === 0) {
              canvasCtx.strokeStyle = 'rgb(255, 80, 80)';
            }
            canvasCtx.beginPath();
            canvasCtx.moveTo(polarCenterX, polarCenterY);
            canvasCtx.lineTo(endPointX, endPointY);
            canvasCtx.stroke();
          }
          // term numbers, in reverse order
          if (true) {
            canvasCtx.font = '14px Arial';
            canvasCtx.textAlign = 'center';
            for (let hi = (this.zeta.terms.length - 1); hi >= 0; hi--) {
              const term = this.zeta.terms[hi];
              if ((term.radius > 0.00001) || (term.radius < -0.00001)) {
                if ((hi < 99) || (hi === hiOfSpiral1) || (hi === (this.zeta.terms.length - 1))) {
                  const endPointX = (polarCenterX + (term.re * this.pixelsPerUnit));
                  const endPointY = (polarCenterY - (term.im * this.pixelsPerUnit));
                  if (hi === (this.zeta.terms.length - 1)) {
                    // draw dot at end point
                    canvasCtx.fillStyle = 'rgb(244, 241, 0)';
                    canvasCtx.beginPath();
                    canvasCtx.ellipse(endPointX, endPointY, 4, 4, 0, 0, (2 * Math.PI));
                    canvasCtx.fill();
                  }
                  canvasCtx.fillStyle = 'rgb(255, 255, 255)';
                  if (hi === hiOfSpiral1) {
                    canvasCtx.fillStyle = '#72E06B';
                  } else if (hi === (this.zeta.terms.length - 1)) {
                    canvasCtx.fillStyle = 'rgb(244, 241, 0)';
                  }
                  canvasCtx.fillText('' + (hi + 1), endPointX, (endPointY - 5));
                  if (hi === hiOfSpiral1) {
                    // draw dot halfway between center and end point
                    canvasCtx.fillStyle = '#72E06B';
                    canvasCtx.beginPath();
                    canvasCtx.ellipse((polarCenterX + endPointX) / 2, (polarCenterY + endPointY) / 2, 4, 4, 0, 0, (2 * Math.PI));
                    canvasCtx.fill();
                  }
                }
              }
            }
          }
          // average point
          canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
          canvasCtx.lineWidth = 2;
          canvasCtx.beginPath();
          canvasCtx.ellipse(polarCenterX + (totalX / this.zeta.terms.length), polarCenterY + (totalY / this.zeta.terms.length), 4, 4, 0, 0, (2 * Math.PI));
          canvasCtx.stroke();
          if (this.drawSpiralNumbers) {
            // just draw spiral number 1
            if ((hiOfSpiral1 >= 0) && (hiOfSpiral1 < this.zeta.terms.length)) {
              const term = this.zeta.terms[hiOfSpiral1];
              if (term.radius > 0.00001) {
                const endPointX = (polarCenterX + (term.re * this.pixelsPerUnit));
                const endPointY = (polarCenterY - (term.im * this.pixelsPerUnit));
                canvasCtx.fillStyle = '#72E06B';
                canvasCtx.beginPath();
                canvasCtx.ellipse((polarCenterX + endPointX) / 2, (polarCenterY + endPointY) / 2, 13, 13, 0, 0, (2 * Math.PI));
                canvasCtx.fill();
                canvasCtx.fillStyle = '#ffffff';
                canvasCtx.font = '17px Arial';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText('1', (polarCenterX + endPointX) / 2, ((polarCenterY + endPointY) / 2) + 5);
              }
            }
          }
          if (this.drawSpiral1) {
            if ((hiOfSpiral1 >= 0) && (hiOfSpiral1 < this.zeta.terms.length)) {
              const term = this.zeta.terms[hiOfSpiral1];
              if (term.radius > 0.00001) {
                const endPointX = (polarCenterX + (term.re * this.pixelsPerUnit));
                const endPointY = (polarCenterY - (term.im * this.pixelsPerUnit));
                canvasCtx.lineWidth = 4;
                canvasCtx.strokeStyle = '#72E06B';
                canvasCtx.beginPath();
                canvasCtx.ellipse((polarCenterX + endPointX) / 2, (polarCenterY + endPointY) / 2, 13, 13, 0, 0, (2 * Math.PI));
                canvasCtx.stroke();
                canvasCtx.lineWidth = 1;
              }
            }
          }
          /*
          if (this.drawGrid) {
            // draw the origin
            // proof-of-concept: currently only works when N is set to auto and none of the formula manipulation buttons are set
            if ((View.termCountAuto === true) && (this.zeta.terms.length > 1)) {
              canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
              canvasCtx.lineWidth = 4;
              canvasCtx.beginPath();
              canvasCtx.ellipse(polarCenterX + totalX, polarCenterY + totalY, 13, 13, 0, 0, (2 * Math.PI));
              canvasCtx.stroke();
              canvasCtx.lineWidth = 1;
            }
          }
          */
        }
        canvasCtx.restore();
        // polar window border
        canvasCtx.lineWidth = 1;
        canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
        canvasCtx.beginPath();
        canvasCtx.rect(polarWindowLeft, polarWindowTop, polarWindowWidth, polarWindowHeight);
        canvasCtx.stroke();
      }
      // phaseWindow
      if (this.phaseWindow) {
        const phaseWindowLeft = 10;
        const phaseWindowTop = (this.phaseWindowMaximized ? 10 : 460);
        const phaseWindowWidth = (this.canvasWidth - 20);
        const phaseWindowHeight = (this.phaseWindowMaximized ? (this.canvasHeight - 20) : 280);
        const axisLeft = phaseWindowLeft + 70;
        const termWidth = 1 + (parseInt(View.components.panelZoomTrackBar.value) / 2);
        const hiOfSpiral1 = this.getTermCountForSpiral1AtT(this.zeta.t);
        canvasCtx.save();
        canvasCtx.beginPath();
        canvasCtx.rect(phaseWindowLeft, phaseWindowTop, phaseWindowWidth, phaseWindowHeight);
        canvasCtx.clip();
        {
          canvasCtx.fillStyle = 'rgb(0, 0, 0)';
          canvasCtx.fillRect(phaseWindowLeft, phaseWindowTop, phaseWindowWidth, phaseWindowHeight);
          [
            {
              left: axisLeft,
              top: Math.round(phaseWindowTop + (phaseWindowHeight / 4)),
              width: phaseWindowWidth - 70,
              unitRadius: (phaseWindowHeight / 4.5),
              text: 'Re',
              getSinCosVal: (val) => { return Math.cos(val); }
            },
            {
              left: axisLeft,
              top: Math.round(phaseWindowTop + ((phaseWindowHeight / 4) * 3)),
              width: phaseWindowWidth - 70,
              unitRadius: (phaseWindowHeight / 4.5),
              text: 'Im',
              getSinCosVal: (val) => { return Math.sin(val); }
            }
          ].forEach((axis) => {
            canvasCtx.save();
            canvasCtx.beginPath();
            canvasCtx.rect(phaseWindowLeft, (axis.top - axis.unitRadius), phaseWindowWidth, (axis.unitRadius * 2));
            canvasCtx.clip();
            canvasCtx.lineWidth = 1;
            canvasCtx.strokeStyle = '#99B7E6';
            canvasCtx.beginPath();
            canvasCtx.moveTo(axis.left, axis.top);
            canvasCtx.lineTo(axis.left + axis.width, axis.top);
            canvasCtx.stroke();
            canvasCtx.fillStyle = 'rgb(255, 255, 255)';
            canvasCtx.font = '14px Arial';
            canvasCtx.textAlign = 'left';
            canvasCtx.fillText(axis.text, axis.left - 55, axis.top + 5);
            // terms
            let runningX = 0;
            let totalValue = 0;
            for (let hi = 0; hi < this.zeta.terms.length; hi++) {
              const term = this.zeta.terms[hi];
              canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
              if ((hi % 2) === 0) {
                canvasCtx.strokeStyle = 'rgb(255, 80, 80)';
              }
              const value = (term.radius * axis.getSinCosVal(term.angle));
              totalValue += value;
              if (runningX < (axis.width + 0)) {
                canvasCtx.lineWidth = termWidth;
                canvasCtx.beginPath();
                canvasCtx.moveTo((axis.left + runningX) + (termWidth / 2), axis.top);
                canvasCtx.lineTo((axis.left + runningX) + (termWidth / 2), axis.top - (value * axis.unitRadius));
                canvasCtx.stroke();
                if ((hi === hiOfSpiral1) || (hi === (this.zeta.terms.length - 1))) {
                  canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
                  if (hi === hiOfSpiral1) {
                    canvasCtx.strokeStyle = '#72E06B';
                  } else if (hi === (this.zeta.terms.length - 1)) {
                    canvasCtx.strokeStyle = 'rgb(244, 241, 0)';
                  }
                  canvasCtx.lineWidth = 1;
                  canvasCtx.beginPath();
                  canvasCtx.moveTo((axis.left + runningX), axis.top - ((value * axis.unitRadius) / 2));
                  canvasCtx.lineTo((axis.left + runningX) + termWidth, axis.top - ((value * axis.unitRadius) / 2));
                  canvasCtx.stroke();
                }
              }
              runningX += termWidth;
            }
            // end point
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#F4F100';
            canvasCtx.beginPath();
            canvasCtx.ellipse(axis.left - 15, axis.top - (totalValue * axis.unitRadius), 4, 4, 0, 0, (2 * Math.PI));
            canvasCtx.stroke();
            canvasCtx.lineWidth = 1;
            canvasCtx.restore();
          });
          // term numbers
          {
            canvasCtx.font = '12px Arial';
            canvasCtx.textAlign = 'center';
            let runningX = 0;
            for (let hi = 0; hi < this.zeta.terms.length; hi++) {
              if ((hi === 0) || (hi === hiOfSpiral1) || ((hi % 50) === 49) || (hi === (this.zeta.terms.length - 1))) {
                canvasCtx.fillStyle = 'rgb(255, 255, 255)';
                if (hi === hiOfSpiral1) {
                  canvasCtx.fillStyle = '#72E06B';
                } else if (hi === (this.zeta.terms.length - 1)) {
                  canvasCtx.fillStyle = 'rgb(244, 241, 0)';
                }
                canvasCtx.fillText('' + (hi + 1), (axisLeft + runningX) + (termWidth / 2), phaseWindowTop + (phaseWindowHeight / 2));
              }
              runningX += termWidth;
              if (runningX > phaseWindowWidth) {
                break;
              }
            }
          }
          // spiral numbers
          if (this.drawSpiralNumbers) {
            canvasCtx.font = '12px Arial';
            canvasCtx.textAlign = 'center';
            let lastSpiralTermNumber = -1;
            for (let sn = 99; sn >= 1; sn--) {
              let spiralTermNumber = 0;
              if (this.zeta.oddOnly || this.zeta.evenOnly) {
                spiralTermNumber = (Math.ceil((this.zeta.t * 2) / (((sn * 2) - 1) * Math.PI)) | 0);
              } else if (this.zeta.eta || this.zeta.altDirection) {
                spiralTermNumber = (Math.round((this.zeta.t * 2) / (((sn * 2) - 1) * Math.PI)) | 0);
              } else if (this.zeta.zetaNMinusHalf) {
                spiralTermNumber = (Math.ceil(this.zeta.t / (((sn * 2) - 1) * Math.PI)) | 0);
              } else {
                spiralTermNumber = (Math.round(this.zeta.t / (((sn * 2) - 1) * Math.PI)) | 0);
              }
              if ((spiralTermNumber > 0) && (spiralTermNumber !== lastSpiralTermNumber)) {
                lastSpiralTermNumber = spiralTermNumber;
                let termIndex = (spiralTermNumber - 1);
                if ((termIndex >= 0) && (termIndex < this.zeta.terms.length)) {
                  canvasCtx.fillStyle = '#72E06B';
                  canvasCtx.beginPath();
                  canvasCtx.ellipse((axisLeft + (termIndex * termWidth)) + (termWidth / 2), (phaseWindowTop + (phaseWindowHeight / 2)) - 26, 10, 10, 0, 0, (2 * Math.PI));
                  canvasCtx.fill();
                  canvasCtx.fillStyle = '#ffffff';
                  canvasCtx.fillText('' + sn, (axisLeft + (termIndex * termWidth)) + (termWidth / 2), (phaseWindowTop + (phaseWindowHeight / 2)) - 22);
                }
                if ((termIndex * termWidth) > phaseWindowWidth) {
                  break;
                }
              }
            }
          }
        }
        canvasCtx.restore();
        // phase window border
        canvasCtx.lineWidth = 1;
        canvasCtx.strokeStyle = 'rgb(255, 255, 255)';
        canvasCtx.beginPath();
        canvasCtx.rect(phaseWindowLeft, phaseWindowTop, phaseWindowWidth, phaseWindowHeight);
        canvasCtx.stroke();
      }
    }
  }
  eulerProductFormulaTerm(sigma, t, prime) {
    // This is Euler's product formula, rewritten such that i is in the numerator
    const denominator = (1 + Math.pow(prime, -2 * sigma)) - (2 * Math.pow(prime, -sigma) * Math.cos(t * Math.log(prime)));
    const numeratorRe = 1 - (Math.pow(prime, -sigma) * Math.cos(t * Math.log(prime)));
    const numeratorIm = Math.pow(prime, -sigma) * Math.sin(-t * Math.log(prime));
    const result = {
      re: (numeratorRe / denominator),
      im: (numeratorIm / denominator)
    };
    return result;
  }
  getTermCountForSpiral1AtT(t) {
    let result;
    if (this.zeta.oddOnly) {
      result = ((Math.ceil((t * 2) / Math.PI)) | 0) + 1;
      if ((result > 1) && ((result % 2) === 0)) {
        result--;
      }
    } else if (this.zeta.evenOnly) {
      result = ((Math.ceil((t * 2) / Math.PI)) | 0);
      if ((result > 1) && ((result % 2) === 1)) {
        result--;
      }
    } else if (this.zeta.mobiusRadius) {
      result = this.zeta.maxTermCount;
    } else if (this.zeta.angleNaturalNumbers) {
      result = this.zeta.maxTermCount;
    } else if (this.zeta.angleNonTrivialZeroLogT) {
      result = this.zeta.maxTermCount;
    } else if (this.zeta.eta || this.zeta.altDirection) {
      result = Math.round((t * 2) / Math.PI);
    } else if (this.zeta.zetaNMinusHalf) {
      result = Math.ceil(t / Math.PI);
    } else {
      result = Math.round(t / Math.PI);
    }
    result = ((result + 0.001) | 0);
    return result;
  }
}

    Object.assign(this.components.panelAltDirectionButton.style, (this.zeta.altDirection ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    Object.assign(this.components.panelZetaNMinusHalfButton.style, (this.zeta.zetaNMinusHalf ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    Object.assign(this.components.panelOddButton.style, (this.zeta.oddOnly ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    Object.assign(this.components.panelEvenButton.style, (this.zeta.evenOnly ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    Object.assign(this.components.panelMobiusRadiusButton.style, (this.zeta.mobiusRadius ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    Object.assign(this.components.panelAngleNaturalNumbersButton.style, (this.zeta.angleNaturalNumbers ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    Object.assign(this.components.panelAngleNonTrivialZeroLogTButton.style, (this.zeta.angleNonTrivialZeroLogT ? this.styles.onOffButton_on : this.styles.onOffButton_off));
    {
      // formula
      this.components.panelFormula_sum_sub.innerHTML = (this.zeta.oddOnly ? 'n=1 odd' : (this.zeta.evenOnly ? 'n=2 even' : 'n=1'));
      this.components.panelFormula_sum_sup.innerHTML = 'N=' + this.zeta.terms.length;
      let panelFormula_term = '';
      if (this.zeta.mobiusRadius) {
        panelFormula_term += 'μ(n)·';
      }
      if (this.zeta.eta) {
        panelFormula_term += '(-1)<sup>n-1</sup>·';
      }
      if (this.zeta.zetaNMinusHalf) {
        panelFormula_term += '(n-0.5)';
      } else {
        panelFormula_term += 'n';
      }
      panelFormula_term += '<sup>-(';
      panelFormula_term += this.zeta.sigma.toFixed(3);
      panelFormula_term += ' + i·';
      if (this.zeta.altDirection) {
        panelFormula_term += '(-1)<sup>n-1</sup>·';
      }
      if (this.zeta.angleNaturalNumbers) {
        panelFormula_term += '2·n·π·' + this.zeta.t.toFixed(3) + '/ln(n)';
      } else if (this.zeta.angleNonTrivialZeroLogT) {
        panelFormula_term += 'ρn·ln(' + this.zeta.t.toFixed(3) + ')/ln(n)';
      } else {
        panelFormula_term += this.zeta.t.toFixed(3);
      }
      panelFormula_term += ')</sup>';
      this.components.panelFormula_term.innerHTML = panelFormula_term;
    }
    this.components.panelZetaResult_equation_right.innerHTML = ((this.zetaView.zeta.analyticContinuationRe >= 0) ? '&nbsp;' : '-') + Math.abs(this.zetaView.zeta.analyticContinuationRe).toFixed(3) + ' ' + ((this.zetaView.zeta.analyticContinuationIm >= 0) ? '+' : '-') + ' i·' + Math.abs(this.zetaView.zeta.analyticContinuationIm).toFixed(3);
    if ((this.zeta.eta === false) && (this.zeta.altDirection === false) && (this.zeta.zetaNMinusHalf === false) && (this.zeta.oddOnly === false) && (this.zeta.evenOnly === false) && (this.zeta.mobiusRadius === false) && (this.zeta.angleNaturalNumbers === false) && (this.zeta.angleNonTrivialZeroLogT === false)) {
      this.components.panelZetaResult.title =
        'Estimation of ζ(s) by analytic continuation, by estimating η in:\n' +
        'ζ(s) = η(s) / (1 - 2^(1 - s))';
      this.components.panelZetaResult_equation_left.style.display = 'block';
      this.components.panelZetaResult_equation_approximation.style.display = 'block';
      this.components.panelZetaResult_equation_right.style.display = 'block';
    } else {
      this.components.panelZetaResult.title = '';
      this.components.panelZetaResult_equation_left.style.display = 'none';
      this.components.panelZetaResult_equation_approximation.style.display = 'none';
      this.components.panelZetaResult_equation_right.style.display = 'none';
    }
    Object.assign(this.components.panelTermCountAutoButton.style, (this.termCountAuto ? this.styles.playButton_on : this.styles.playButton_off));
    Object.assign(this.components.panelTermCountTPOW2Button.style, (this.termCountLockTSquared ? this.styles.playButton_on : this.styles.playButton_off));
    this.components.panelTermCountLabel.innerHTML = '' + this.zeta.terms.length;
    this.components.panelReLabel.innerHTML = '' + this.zeta.sigma.toFixed(3);
    this.components.panelImLabel.innerHTML = '' + this.zeta.t.toFixed(3);
    Object.assign(this.components.panelPlayReverseButton.style, ((this.runT && this.reverseT) ? this.styles.playButton_on : this.styles.playButton_off));
    Object.assign(this.components.panelPlayButton.style, ((this.runT && !this.reverseT) ? this.styles.playButton_on : this.styles.playButton_off));
  },
  checkTermCountAuto() {
    if (this.termCountAuto) {
      let termCountSpiral1 = this.zetaView.getTermCountForSpiral1AtT(this.zeta.t);
      if (termCountSpiral1 < 1) {
        termCountSpiral1 = 1;
      }
      this.zeta.setTermCount(termCountSpiral1);
      this.components.panelTermCountTrackBar.value = this.zeta.terms.length;
    } else if (this.termCountLockTSquared) {
      this.zeta.setTermCount(Math.round(this.zeta.t * this.zeta.t));
      this.components.panelTermCountTrackBar.value = this.zeta.terms.length;
    }
  },
  animateThread() {
    if (this.runT === true) {
      let dirDeltaTPerAnimation = this.reverseT ? -this.deltaTPerAnimation : this.deltaTPerAnimation;
      if (Math.abs(dirDeltaTPerAnimation) > 0.000001) {
        if ((this.zeta.t + dirDeltaTPerAnimation) > 0) {
          if ((this.zeta.t + dirDeltaTPerAnimation) < (this.zeta.maxTInt + 0.999)) {
            this.zeta.setT(this.zeta.t + dirDeltaTPerAnimation);
          } else {
            this.zeta.setT(this.zeta.maxTInt + 0.999);
            this.runT = false;
          }
        } else {
          this.zeta.setT(0);
          this.runT = false;
        }
        this.checkTermCountAuto();
        this.zetaView.draw();
        this.components.panelImIntTrackBar.value = Math.floor(this.zeta.t);
        this.components.panelImFracTrackBar.value = Math.abs(this.zeta.t - Math.floor(this.zeta.t)).toFixed(3);
        this.render();
      }
    }
    window.requestAnimationFrame(() => { this.animateThread(); });
  }
};
View.init();
